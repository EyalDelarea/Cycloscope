name: Bug report
description: Report a problem with Cycloscope
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug! Please fill in as much as you can — it makes fixes much faster.
  - type: input
    id: version
    attributes:
      label: Cycloscope version
      placeholder: "e.g. 0.1.0 (from the release / installer filename)"
    validations:
      required: true
  - type: dropdown
    id: format
    attributes:
      label: Plugin format
      options: [VST3, AU (Audio Unit), Standalone, Both VST3 and AU]
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version & chip
      placeholder: "e.g. Sequoia 15.5, Apple Silicon (M2)"
    validations:
      required: true
  - type: input
    id: daw
    attributes:
      label: DAW / host + version
      placeholder: "e.g. Ableton Live 12.1, Logic Pro 11.1, REAPER 7.x"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Load Cycloscope on a track
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / crash report
      description: Paste relevant output, or attach a crash report from ~/Library/Logs/DiagnosticReports.
      render: shell
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
